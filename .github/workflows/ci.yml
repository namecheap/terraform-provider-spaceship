name: CI

on:
    push:
        branches:
            - master
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - "CLAUDE.md"
            - "AGENTS.md"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/pull_request_template.md"
    pull_request:
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - "CLAUDE.md"
            - "AGENTS.md"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/pull_request_template.md"

# Least-privilege default: CI only reads the repo. Codecov uses its own token
# (CODECOV_TOKEN secret), and upload-artifact does not require write perms.
permissions:
    contents: read

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: go.mod
                  check-latest: true

            - name: Lint
              uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
              with:
                  version: v2.11

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
              with:
                  terraform_wrapper: false

            - name: Unit Test with Coverage
              run: make test-cover

            - name: Check Coverage Threshold
              run: |
                  COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
                  echo "Total coverage: ${COVERAGE}%"
                  THRESHOLD=40.0
                  if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
                      echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
                      exit 1
                  fi

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: coverage-report
                  path: coverage.out
                  retention-days: 30

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
              with:
                  files: coverage.out
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false

            # Two separate checks on the autogenerated docs/ tree:
            #   1. Drift check — regenerate from the provider schema and diff
            #      against what's committed. Catches PRs that change schema
            #      but forget to run `make docs`.
            #   2. Schema check — `tfplugindocs validate` lints the structure
            #      of the docs files themselves (front-matter, required
            #      sections, etc.). It does not detect drift.
            # `tfplugindocs` has no single command that does both.
            - name: Check docs are up-to-date and well-formed
              run: |
                  make docs
                  if ! git diff --exit-code docs/; then
                      echo "❌ Documentation is out of sync with provider code!"
                      echo "Please run 'make docs' locally and commit the changes."
                      echo ""
                      echo "Changed files:"
                      git diff --name-only docs/
                      echo ""
                      echo "Diff:"
                      git diff docs/
                      exit 1
                  fi
                  make docs-validate

    acceptance:
        name: Acceptance Tests
        needs: check
        runs-on: ubuntu-latest
        concurrency:
            group: acceptance-tests
            cancel-in-progress: false
        steps:
            - name: Check Acceptance Secrets
              id: acc_secrets
              env:
                  SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
                  SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
                  SPACESHIP_TEST_DOMAIN: ${{ secrets.SPACESHIP_TEST_DOMAIN }}
              run: |
                  if [ -n "$SPACESHIP_API_KEY" ] && [ -n "$SPACESHIP_API_SECRET" ] && [ -n "$SPACESHIP_TEST_DOMAIN" ]; then
                      echo "has_secrets=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has_secrets=false" >> "$GITHUB_OUTPUT"
                  fi

            - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}

            - name: Set up Go
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: go.mod
                  check-latest: true

            - name: Set up Terraform
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
              uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
              with:
                  terraform_wrapper: false

            - name: Acceptance Tests
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
              env:
                  SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
                  SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
                  SPACESHIP_TEST_DOMAIN: ${{ secrets.SPACESHIP_TEST_DOMAIN }}
                  TF_ACC: 1
              run: make testacc
