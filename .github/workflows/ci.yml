name: CI

on:
    push:
        branches:
            - master
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - "CLAUDE.md"
            - "AGENTS.md"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/pull_request_template.md"
    pull_request:
        paths-ignore:
            - "**.md"
            - "LICENSE"
            - "CLAUDE.md"
            - "AGENTS.md"
            - ".github/ISSUE_TEMPLATE/**"
            - ".github/pull_request_template.md"

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.11
                  args: --timeout=3m

            - name: Unit Test with Coverage
              run: make test-cover

            - name: Check Coverage Threshold
              run: |
                  COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
                  echo "Total coverage: ${COVERAGE}%"
                  THRESHOLD=40.0
                  if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
                      echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
                      exit 1
                  fi

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@v6
              with:
                  name: coverage-report
                  path: coverage.out
                  retention-days: 30

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v6
              with:
                  files: coverage.out
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: false

            - name: Validate Documentation
              run: |
                  make docs
                  if ! git diff --exit-code docs/; then
                      echo "❌ Documentation is out of sync with provider code!"
                      echo "Please run 'make docs' locally and commit the changes."
                      echo ""
                      echo "Changed files:"
                      git diff --name-only docs/
                      echo ""
                      echo "Diff:"
                      git diff docs/
                      exit 1
                  fi
                  make docs-validate

    acceptance:
        name: Acceptance Tests
        needs: check
        runs-on: ubuntu-latest
        concurrency:
            group: acceptance-tests
            cancel-in-progress: false
        steps:
            - name: Check Acceptance Secrets
              id: acc_secrets
              env:
                  SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
                  SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
                  SPACESHIP_TEST_DOMAIN: ${{ secrets.SPACESHIP_TEST_DOMAIN }}
              run: |
                  if [ -n "$SPACESHIP_API_KEY" ] && [ -n "$SPACESHIP_API_SECRET" ] && [ -n "$SPACESHIP_TEST_DOMAIN" ]; then
                      echo "has_secrets=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has_secrets=false" >> "$GITHUB_OUTPUT"
                  fi

            - uses: actions/checkout@v5
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}

            - name: Set up Go
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Acceptance Tests
              if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
              env:
                  SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
                  SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
                  SPACESHIP_TEST_DOMAIN: ${{ secrets.SPACESHIP_TEST_DOMAIN }}
                  TF_ACC: 1
              run: make testacc
