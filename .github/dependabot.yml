version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Go module bumps change the SHIPPED provider binary, so they must land as
    # a releasing Conventional Commit type. release-please maps `fix:` -> patch,
    # which opens/refreshes the Release PR and actually ships the dependency.
    # Dependabot's default `chore(deps):` is NON-releasing, so without this
    # bumps would sit unreleased until an unrelated fix:/feat: swept them in.
    # `include: scope` yields `fix(deps): ...`. See CLAUDE.md > Release process.
    commit-message:
      prefix: "fix"
      include: "scope"
    # One PR for all Go bumps. Acceptance tests then run against the COMBINED
    # dependency set — exactly what master will contain after merge — and a
    # burst of per-dep PRs can't cancel each other in the acceptance-tests
    # concurrency group (GitHub queues at most ONE pending job per group;
    # newer arrivals cancel the waiting one). If one bump in the group breaks
    # tests, add it to exclude-patterns so the rest can merge, then handle it
    # separately.
    groups:
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Action bumps are CI-only and never touch the shipped binary, so they use
    # a NON-releasing type (`ci`) and must not cut a release.
    commit-message:
      prefix: "ci"
      include: "scope"
    # One PR for all action bumps, same rationale as the gomod group.
    groups:
      actions:
        patterns:
          - "*"
